name: Generate Good First Issue

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  models: read

jobs:
  generate-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read guidelines
        id: guidelines
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat docs/maintainers/good_first_issues_guidelines.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Read template
        id: template
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat .github/ISSUE_TEMPLATE/02_good_first_issue.yml >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Pick file
        id: file
        run: |
          FILE=$(find . -name "*.py" | grep -v test | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "content<<EOF" >> $GITHUB_OUTPUT
          head -n 200 "$FILE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate issue with AI
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: mistral-ai/ministral-3b
          system-prompt: |
            You are a maintainer generating a high-quality "good first issue".

            The template is written in YAML format.
            Convert it into a clean GitHub issue body (markdown).

            Follow the structure and fields, but DO NOT output YAML.

            Only generate beginner-friendly issues:
            - < 2 hours work
            - 1–2 files max
            - clear acceptance criteria

            If no suitable issue exists, return ONLY: NONE
          prompt: |
            --- GUIDELINES ---
            ${{ steps.guidelines.outputs.content }}

            --- TEMPLATE ---
            ${{ steps.template.outputs.content }}

            --- CODE ---
            File: ${{ steps.file.outputs.file }}

            ${{ steps.file.outputs.content }}

      - name: Create issue
        if: steps.ai.outputs.response != 'NONE'
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ steps.ai.outputs.response }}
        with:
          script: |
            const body = process.env.ISSUE_BODY;
            const title = body.split("\n")[0].slice(0, 100);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["good first issue"]
            });